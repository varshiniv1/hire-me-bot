<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>hire-me-bot — Application Stats</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    margin: 0;
    padding: 2rem;
  }
  h1 { font-size: 1.25rem; margin-bottom: 0.25rem; }
  #subtitle { color: #8b949e; margin-bottom: 1.5rem; }
  nav { margin-bottom: 1.5rem; font-size: 0.85rem; }
  nav a { color: #58a6ff; text-decoration: none; margin-right: 1rem; }
  nav a:hover { text-decoration: underline; }
  #detail {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 0.75rem 1rem;
    margin-bottom: 1rem;
    min-height: 1.2rem;
    font-size: 0.95rem;
  }
  #calendar-wrap { overflow-x: auto; }
  #calendar {
    display: grid;
    grid-auto-flow: column;
    grid-template-rows: repeat(7, 12px);
    gap: 3px;
    width: max-content;
  }
  .day {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    background: #161b22;
    cursor: pointer;
  }
  .day:hover { outline: 1px solid #58a6ff; }
  .day.empty { cursor: default; visibility: hidden; }
  .day.level-0, .swatch.level-0 { background: #161b22; }
  .day.level-1, .swatch.level-1 { background: #0e4429; }
  .day.level-2, .swatch.level-2 { background: #006d32; }
  .day.level-3, .swatch.level-3 { background: #26a641; }
  .day.level-4, .swatch.level-4 { background: #39d353; }
  .swatch { width: 12px; height: 12px; border-radius: 2px; display: inline-block; }
  #months {
    display: grid;
    grid-auto-flow: column;
    gap: 3px;
    width: max-content;
    margin-bottom: 4px;
    font-size: 0.7rem;
    color: #8b949e;
  }
  #legend { margin-top: 0.75rem; font-size: 0.8rem; color: #8b949e; display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>
  <nav><a href="index.html">Application Stats</a><a href="jobs.html">Jobs</a></nav>
  <h1>Job Application Stats</h1>
  <div id="subtitle">Click any day to see how many applications went out that day.</div>
  <div id="detail">Click a day to see application count.</div>
  <div id="calendar-wrap">
    <div id="months"></div>
    <div id="calendar"></div>
  </div>
  <div id="legend">
    Less
    <span class="swatch level-0"></span>
    <span class="swatch level-1"></span>
    <span class="swatch level-2"></span>
    <span class="swatch level-3"></span>
    <span class="swatch level-4"></span>
    More
  </div>

<script>
// Same anon key as jobs.html -- locked down server-side to id/status/
// applied_at only (see sql/schema.sql), no JD/company/title exposure.
const SUPABASE_URL = 'https://lyadqbhufusevbikviyh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx5YWRxYmh1ZnVzZXZiaWt2aXloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NDAzOTIsImV4cCI6MjA5ODUxNjM5Mn0.O2BXhBYA2aJEvtJ_m2GA_S6R2jbpasKK-u0wfcO3rq8';

const DAYS_TO_SHOW = 365;

function levelFor(count) {
  if (!count) return 0;
  if (count === 1) return 1;
  if (count <= 3) return 2;
  if (count <= 6) return 3;
  return 4;
}

function formatDate(d) {
  return d.toISOString().slice(0, 10);
}

// Live from Supabase (always current, reflects a click immediately on next
// page load) with a fallback to the daily-generated stats.json snapshot if
// the live query fails for any reason (offline, RLS misconfigured, etc.).
async function loadStats() {
  try {
    const resp = await fetch(
      `${SUPABASE_URL}/rest/v1/postings?select=applied_at&status=eq.applied&applied_at=not.is.null&limit=50000`,
      { headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` } }
    );
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const rows = await resp.json();
    const counts = {};
    for (const row of rows) {
      const day = row.applied_at.slice(0, 10);
      counts[day] = (counts[day] || 0) + 1;
    }
    return counts;
  } catch (e) {
    try {
      const resp = await fetch('stats.json', { cache: 'no-store' });
      if (resp.ok) return await resp.json();
    } catch (e2) {
      // Neither source available -- render an empty calendar rather than fail.
    }
    return {};
  }
}

async function render() {
  const stats = await loadStats();

  const today = new Date();
  today.setUTCHours(0, 0, 0, 0);
  const start = new Date(today);
  start.setUTCDate(start.getUTCDate() - (DAYS_TO_SHOW - 1));
  // Align the grid to start on a Sunday so weeks are consistent columns.
  const startWeekday = start.getUTCDay();
  start.setUTCDate(start.getUTCDate() - startWeekday);

  const calendar = document.getElementById('calendar');
  const monthsRow = document.getElementById('months');
  const detail = document.getElementById('detail');

  let cursor = new Date(start);
  let lastMonth = -1;
  let weekCount = 0;
  while (cursor <= today) {
    if (cursor.getUTCDay() === 0) {
      weekCount++;
      const month = cursor.getUTCMonth();
      const label = document.createElement('div');
      if (month !== lastMonth) {
        label.textContent = cursor.toLocaleString('en-US', { month: 'short', timeZone: 'UTC' });
        lastMonth = month;
      }
      monthsRow.appendChild(label);
    }

    const cell = document.createElement('div');
    if (cursor < start || cursor > today) {
      cell.className = 'day empty';
    } else {
      const dateStr = formatDate(cursor);
      const count = stats[dateStr] || 0;
      cell.className = `day level-${levelFor(count)}`;
      cell.title = `${count} application${count === 1 ? '' : 's'} on ${dateStr}`;
      cell.addEventListener('click', () => {
        detail.textContent = `${count} application${count === 1 ? '' : 's'} on ${dateStr}`;
      });
    }
    calendar.appendChild(cell);
    cursor.setUTCDate(cursor.getUTCDate() + 1);
  }
}

render();
</script>
</body>
</html>

name: Re-seed companies from SimplifyJobs repos

on:
  schedule:
    # Weekly -- the SimplifyJobs repos get community additions constantly,
    # but company lists don't change fast enough to need it more often.
    - cron: '0 8 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  reseed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Merge new companies from SimplifyJobs repos
        # Merge-mode only ADDS companies not already present (by source+token)
        # and not on the excluded_companies.yaml blocklist -- never touches
        # existing hand-edited entries. See scripts/seed_companies.py.
        run: python scripts/seed_companies.py

      - name: Commit changes if any
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/companies.yaml
          if git diff --staged --quiet; then
            echo "No new companies to add"
            exit 0
          fi
          git commit -m "Re-seed: add new companies from SimplifyJobs repos"
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin main
            git rebase origin/main
            sleep $((RANDOM % 10 + 1))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

name: hire-me-bot pipeline

on:
  schedule:
    # Every 3h Tue/Wed/Thu (2,3,4), every 6h the rest of the week (0,1,5,6).
    # Cron day-of-week is UTC, not Eastern -- close enough for this purpose,
    # not worth the DST-shifting complexity of exact Eastern alignment.
    - cron: '0 */3 * * 2,3,4'
    - cron: '0 */6 * * 0,1,5,6'
  workflow_dispatch: {}

env:
  FIT_SCORE_NOTIFY_THRESHOLD: 4

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m hire_me_bot.pipeline

      - name: Generate REPORT.md
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/report.py

      - name: Generate docs/jobs.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/generate_jobs_json.py

      - name: Generate docs/applied.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/generate_applied_json.py

      - name: Commit REPORT.md and docs/jobs.json if changed
        # Committed every run (not just daily like stats.yml) -- REPORT.md
        # is the git-trackable log of every posting found, and jobs.json
        # feeds the GitHub Pages job-browser page (docs/jobs.html). Only
        # commits when content actually changed, so a quiet cycle doesn't
        # add an empty commit every 3 hours.
        #
        # This run's checkout can be many minutes stale by the time the full
        # company crawl finishes -- if main moved in the meantime (this repo
        # also has jsearch.yml regenerating and committing these exact same
        # 3 files on its own schedule), a plain `git push` gets rejected as
        # non-fast-forward. A `git rebase` retry used to live here, but that
        # produces a genuine textual conflict rather than resolving cleanly:
        # both sides independently rewrote the whole file from a DB read, so
        # there's nothing for git to line-merge. Since these files are pure
        # derived output (Supabase is the actual source of truth), the fix
        # on conflict is to discard this run's commit, catch up to the new
        # main, and regenerate fresh against it -- not to try reconciling
        # two independently-regenerated copies.
        #
        # No separate "deploy to Pages" step after this -- GitHub Pages is
        # configured as branch-based (source: main /docs), so it rebuilds
        # and republishes automatically whenever this push lands. That
        # sidesteps the actions/deploy-pages Deployments API, which was
        # intermittently failing with a bare "Deployment failed, try again
        # later." unrelated to anything in this repo.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add REPORT.md docs/jobs.json docs/applied.json
          git diff --staged --quiet || git commit -m "Update REPORT.md and jobs.json"
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin main
            git reset --hard origin/main
            python scripts/report.py
            python scripts/generate_jobs_json.py
            python scripts/generate_applied_json.py
            git add REPORT.md docs/jobs.json docs/applied.json
            git diff --staged --quiet || git commit -m "Update REPORT.md and jobs.json"
            sleep $((RANDOM % 10 + 1))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

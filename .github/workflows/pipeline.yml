name: hire-me-bot pipeline

on:
  schedule:
    # Every 3h Tue/Wed/Thu (2,3,4), every 6h the rest of the week (0,1,5,6).
    # Cron day-of-week is UTC, not Eastern -- close enough for this purpose,
    # not worth the DST-shifting complexity of exact Eastern alignment.
    - cron: '0 */3 * * 2,3,4'
    - cron: '0 */6 * * 0,1,5,6'
  workflow_dispatch: {}

env:
  FIT_SCORE_NOTIFY_THRESHOLD: 4

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m hire_me_bot.pipeline

      - name: Generate REPORT.md
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/report.py

      - name: Generate docs/jobs.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/generate_jobs_json.py

      - name: Generate docs/applied.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/generate_applied_json.py

      - name: Commit REPORT.md and docs/jobs.json if changed
        # Committed every run (not just daily like stats.yml) -- REPORT.md
        # is the git-trackable log of every posting found, and jobs.json
        # feeds the GitHub Pages job-browser page (docs/jobs.html). Only
        # commits when content actually changed, so a quiet cycle doesn't
        # add an empty commit every 3 hours.
        #
        # This run's checkout can be many minutes stale by the time the full
        # company crawl finishes -- if main moved in the meantime (another
        # run, a manual push), a plain `git push` gets rejected as
        # non-fast-forward. Rebase onto the latest main and retry a few
        # times rather than just failing the whole run over a generated
        # file (real conflict here is effectively impossible since nothing
        # else touches REPORT.md/jobs.json by hand).
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add REPORT.md docs/jobs.json docs/applied.json
          git diff --staged --quiet || git commit -m "Update REPORT.md and jobs.json"
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin main
            git rebase origin/main
            sleep $((RANDOM % 10 + 1))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1

      - name: Deploy GitHub Pages
        # Pushes made with the default GITHUB_TOKEN (like the commit above)
        # don't trigger other workflows' `push` events -- a separate
        # deploy-pages.yml watching for pushes to docs/** would never
        # actually fire from this job's own commit. Deploying directly in
        # the same run sidesteps that entirely.
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4

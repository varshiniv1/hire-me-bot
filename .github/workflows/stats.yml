name: hire-me-bot stats

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Generate stats.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/generate_stats.py

      - name: Record run timestamp
        # GitHub auto-disables scheduled workflows after 60 days with no
        # repo activity. stats.json alone might not change day-to-day (no
        # new applications), so this file changes every single run
        # unconditionally, guaranteeing a daily commit forever.
        run: date -u +"%Y-%m-%dT%H:%M:%SZ" > docs/last_updated.txt

      - name: Commit changes
        # If main moved since this run's checkout (another workflow, a
        # manual push), a plain `git push` gets rejected as
        # non-fast-forward. Rebase onto the latest main and retry rather
        # than failing the whole run over a generated file.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/stats.json docs/last_updated.txt
          git commit -m "Update application stats"
          for i in 1 2 3 4 5; do
            git push && exit 0
            git fetch origin main
            git rebase origin/main
            sleep $((RANDOM % 10 + 1))
          done
          echo "::error::Failed to push after 5 attempts"
          exit 1
        # No separate deploy step -- GitHub Pages is branch-based (source:
        # main /docs) and rebuilds automatically whenever this push lands.
